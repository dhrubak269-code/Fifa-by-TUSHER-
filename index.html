<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TUSHAR - LIVE TV</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a0a;
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 12px 20px;
            text-align: center;
            border-bottom: 2px solid #e94560;
        }
        .header h1 {
            font-size: 22px;
            background: linear-gradient(90deg, #e94560, #ff6b6b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { font-size: 12px; color: #888; margin-top: 2px; }
        .video-container {
            flex: 1;
            background: #000;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .status-bar {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            z-index: 10;
        }
        .status-bar.playing { color: #4caf50; border: 1px solid #4caf50; }
        .status-bar.error { color: #f44336; border: 1px solid #f44336; }
        .channels {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px 12px;
            background: #111;
            justify-content: center;
        }
        .channel-btn {
            flex: 1;
            min-width: 70px;
            padding: 10px 8px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: #ccc;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        .channel-btn:hover, .channel-btn.active {
            background: #e94560;
            color: white;
            border-color: #e94560;
        }
        .channel-btn .flag { font-size: 16px; display: block; margin-bottom: 4px; }
        .channel-btn .name { font-weight: 600; }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #666;
            font-size: 14px;
            z-index: 5;
        }
        /* Mobile optimizations */
        @media (max-width: 480px) {
            .channel-btn { min-width: 60px; font-size: 11px; padding: 8px 6px; }
            .header h1 { font-size: 18px; }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>📺 FIFA LIVE TV</h1>
        <p>by TUSHAR</p>
    </div>

    <div class="video-container" id="videoContainer">
        <video id="videoPlayer" controls playsinline></video>
        <div class="loading" id="loadingText">⏸ Select a channel</div>
        <div class="status-bar" id="status">⏸ Idle</div>
    </div>

    <div class="channels" id="channels">
        <button class="channel-btn" data-url="http://198.195.239.50:8095/tsports/index.m3u8">
            <span class="flag">🇧🇩</span>
            <span class="name">T Sports</span>
        </button>
        <button class="channel-btn" data-url="http://198.195.239.50:8095/ptv/index.m3u8">
            <span class="flag">🇧🇩</span>
            <span class="name">PTV</span>
        </button>
        <button class="channel-btn" data-url="http://198.195.239.50:8095/somoyTv/tracks-v1a1/mono.m3u8">
            <span class="flag">🇧🇩</span>
            <span class="name">Somoy TV</span>
        </button>
        <button class="channel-btn" data-url="http://198.195.239.50:8095/btv/video.m3u8">
            <span class="flag">🇧🇩</span>
            <span class="name">BTV</span>
        </button>
    </div>

    <!-- HLS.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script>
        const video = document.getElementById('videoPlayer');
        const statusEl = document.getElementById('status');
        const loadingEl = document.getElementById('loadingText');
        const channels = document.querySelectorAll('.channel-btn');
        let currentHls = null;

        function playChannel(url, btn) {
            // UI update
            channels.forEach(b => b.classList.remove('active'));
            if (btn) btn.classList.add('active');
            loadingEl.style.display = 'block';
            loadingEl.textContent = '⏳ Loading stream...';
            statusEl.textContent = '⏳ Connecting...';
            statusEl.className = 'status-bar';

            // Destroy previous HLS instance
            if (currentHls) {
                currentHls.destroy();
                currentHls = null;
            }

            // Use native HLS if available (Safari, iOS)
            if (video.canPlayType('application/vnd.apple.mpegurl')) {
                video.src = url;
                video.play().catch(() => {});
                video.addEventListener('playing', () => {
                    loadingEl.style.display = 'none';
                    statusEl.textContent = '▶️ Playing';
                    statusEl.className = 'status-bar playing';
                }, {once: true});
                video.addEventListener('error', () => {
                    statusEl.textContent = '✖ Error loading stream';
                    statusEl.className = 'status-bar error';
                }, {once: true});
                return;
            }

            // HLS.js for other browsers
            if (Hls.isSupported()) {
                currentHls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30,
                    manifestLoadPolicy: {
                        default: { maxTimeToFirstByteMs: 10000, maxLoadTimeMs: 30000 }
                    }
                });

                currentHls.loadSource(url);
                currentHls.attachMedia(video);

                currentHls.on(Hls.Events.MANIFEST_PARSED, () => {
                    video.play().catch(() => {});
                    loadingEl.style.display = 'none';
                    statusEl.textContent = '▶️ Playing';
                    statusEl.className = 'status-bar playing';
                });

                currentHls.on(Hls.Events.ERROR, (event, data) => {
                    if (data.fatal) {
                        statusEl.textContent = '✖ Stream error — try another channel';
                        statusEl.className = 'status-bar error';
                        loadingEl.textContent = '⏸ Select a channel';
                    }
                });
            } else {
                statusEl.textContent = '✖ HLS not supported in this browser';
                statusEl.className = 'status-bar error';
                loadingEl.textContent = '⏸ Select a channel';
            }
        }

        // Channel click handlers
        channels.forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const url = this.dataset.url;
                if (url) playChannel(url, this);
            });
        });

        // Auto-load first channel
        if (channels.length > 0) {
            // Don't auto-play — let user click
            // But highlight first
            // channels[0].classList.add('active');
        }

        // Handle visibility change — pause when hidden
        document.addEventListener('visibilitychange', () => {
            if (document.hidden && !video.paused) {
                video.pause();
            }
        });
    </script>
</body>
</html>
